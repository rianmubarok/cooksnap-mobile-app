<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Kata Sandi | CookSnap</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PocketBase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>

    <!-- Tailwind Config (shared across all pages) -->
    <script src="assets/scripts/config.js"></script>
</head>

<body class="font-sans text-gray-800 bg-gray-50 flex flex-col min-h-screen">
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <div class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
        <!-- Floating shapes -->
        <div class="absolute inset-0 w-full h-full pointer-events-none z-0">
            <div class="absolute w-96 h-96 bg-cooklime/30 rounded-full blur-[80px] -top-24 -left-24"></div>
            <div class="absolute w-72 h-72 bg-cookorange/15 rounded-full blur-[80px] -bottom-12 -right-12"></div>
        </div>

        <div id="form-container" class="bg-white/80 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-xl border border-white relative z-10 hidden">
            <div class="flex justify-center mb-6">
                <div class="bg-cookgreen-100 p-4 rounded-full text-cookgreen-600">
                    <i data-feather="key" class="w-8 h-8"></i>
                </div>
            </div>
            <h1 class="text-3xl font-medium text-center text-gray-900 mb-2">Reset Kata Sandi</h1>
            <p class="text-center text-gray-500 mb-8">Masukkan kata sandi baru untuk akun Anda.</p>

            <form id="reset-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kata Sandi Baru</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
                            placeholder="Minimal 8 karakter" />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="check-circle" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password-confirm" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
                            placeholder="Ulangi kata sandi baru" />
                    </div>
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center items-center gap-2 bg-cookgreen-900 text-white py-3 px-4 rounded-xl font-semibold hover:bg-cookgreen-800 hover:shadow-lg hover:-translate-y-0.5 transition-all">
                    Simpan Kata Sandi
                </button>
            </form>
        </div>

        <div id="status-container" class="bg-white/80 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-xl border border-white relative z-10 text-center hidden">
            <div class="flex justify-center mb-6">
                <div id="icon-container" class="bg-blue-100 p-4 rounded-full text-blue-600">
                    <i id="status-icon" data-feather="loader" class="w-10 h-10 animate-spin"></i>
                </div>
            </div>
            <h1 id="status-title" class="text-3xl font-medium text-gray-900 mb-2">Memeriksa...</h1>
            <p id="status-message" class="text-gray-500 mb-8">Sedang memeriksa token reset password Anda.</p>
            <a href="/" class="inline-block bg-gray-100 text-gray-700 font-medium py-3 px-6 rounded-xl hover:bg-gray-200 transition-all">Kembali ke Beranda</a>
        </div>
    </div>

    <script src="assets/scripts/utils.js"></script>
    <script src="assets/scripts/reset-password.js"></script>
</body>

</html>
