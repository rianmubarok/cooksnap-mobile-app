<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Kata Sandi | CookSnap</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- PocketBase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Work Sans"', 'sans-serif'],
                    },
                    colors: {
                        cookgreen: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            800: '#166534',
                            900: '#143B16',
                        },
                        cooklime: '#A7EE6A',
                        cookorange: '#F58700',
                    }
                }
            }
        }
    </script>
</head>

<body class="font-sans text-gray-800 bg-gray-50 flex flex-col min-h-screen">
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2"></div>

    <div class="flex-1 flex items-center justify-center p-6 relative overflow-hidden">
        <!-- Floating shapes -->
        <div class="absolute inset-0 w-full h-full pointer-events-none z-0">
            <div class="absolute w-96 h-96 bg-cooklime/30 rounded-full blur-[80px] -top-24 -left-24"></div>
            <div class="absolute w-72 h-72 bg-cookorange/15 rounded-full blur-[80px] -bottom-12 -right-12"></div>
        </div>

        <div id="form-container" class="bg-white/80 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-xl border border-white relative z-10 hidden">
            <div class="flex justify-center mb-6">
                <div class="bg-cookgreen-100 p-4 rounded-full text-cookgreen-600">
                    <i data-feather="key" class="w-8 h-8"></i>
                </div>
            </div>
            <h1 class="text-3xl font-medium text-center text-gray-900 mb-2">Reset Kata Sandi</h1>
            <p class="text-center text-gray-500 mb-8">Masukkan kata sandi baru untuk akun Anda.</p>

            <form id="reset-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kata Sandi Baru</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="lock" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
                            placeholder="Minimal 8 karakter" />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Kata Sandi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="check-circle" class="w-5 h-5 text-gray-400"></i>
                        </div>
                        <input type="password" id="password-confirm" required minlength="8"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
                            placeholder="Ulangi kata sandi baru" />
                    </div>
                </div>
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center items-center gap-2 bg-cookgreen-900 text-white py-3 px-4 rounded-xl font-semibold hover:bg-cookgreen-800 hover:shadow-lg hover:-translate-y-0.5 transition-all">
                    Simpan Kata Sandi
                </button>
            </form>
        </div>

        <div id="status-container" class="bg-white/80 backdrop-blur-md w-full max-w-md p-8 rounded-3xl shadow-xl border border-white relative z-10 text-center hidden">
            <div class="flex justify-center mb-6">
                <div id="icon-container" class="bg-blue-100 p-4 rounded-full text-blue-600">
                    <i id="status-icon" data-feather="loader" class="w-10 h-10 animate-spin"></i>
                </div>
            </div>
            <h1 id="status-title" class="text-3xl font-medium text-gray-900 mb-2">Memeriksa...</h1>
            <p id="status-message" class="text-gray-500 mb-8">Sedang memeriksa token reset password Anda.</p>
            <a href="/" class="inline-block bg-gray-100 text-gray-700 font-medium py-3 px-6 rounded-xl hover:bg-gray-200 transition-all">Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        feather.replace();
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-lg shadow-lg text-white font-medium flex items-center gap-2 transform transition-all duration-300 translate-y-[-100%] opacity-0 ${type === 'error' ? 'bg-red-500' : 'bg-cookgreen-600'}`;
            toast.innerHTML = `<i data-feather="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-5 h-5"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            feather.replace();
            
            setTimeout(() => {
                toast.classList.remove('translate-y-[-100%]', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const pb = new PocketBase('/'); 
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const formContainer = document.getElementById('form-container');
            const statusContainer = document.getElementById('status-container');
            const titleEl = document.getElementById('status-title');
            const msgEl = document.getElementById('status-message');
            const iconContainer = document.getElementById('icon-container');
            const iconEl = document.getElementById('status-icon');

            if (!token) {
                statusContainer.classList.remove('hidden');
                titleEl.textContent = 'Token Tidak Valid';
                msgEl.textContent = 'Link reset kata sandi tidak lengkap atau tidak valid.';
                iconContainer.className = 'bg-red-100 p-4 rounded-full text-red-600';
                iconEl.setAttribute('data-feather', 'x-circle');
                iconEl.classList.remove('animate-spin');
                feather.replace();
                return;
            }

            // Show the form
            formContainer.classList.remove('hidden');

            const form = document.getElementById('reset-form');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('password-confirm').value;

                if (password !== passwordConfirm) {
                    showToast('Kata sandi tidak cocok.', 'error');
                    return;
                }

                if (password.length < 8) {
                    showToast('Kata sandi minimal 8 karakter.', 'error');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i data-feather="loader" class="w-5 h-5 animate-spin"></i> Menyimpan...';
                feather.replace();

                try {
                    await pb.collection('users').confirmPasswordReset(token, password, passwordConfirm);
                    
                    formContainer.classList.add('hidden');
                    statusContainer.classList.remove('hidden');
                    
                    titleEl.textContent = 'Berhasil!';
                    msgEl.textContent = 'Kata sandi Anda telah berhasil diperbarui. Silakan buka kembali aplikasi CookSnap dan login dengan kata sandi baru.';
                    iconContainer.className = 'bg-cookgreen-100 p-4 rounded-full text-cookgreen-600';
                    iconEl.setAttribute('data-feather', 'check-circle');
                    iconEl.classList.remove('animate-spin');
                    feather.replace();
                } catch (error) {
                    console.error(error);
                    showToast(error?.response?.message || 'Gagal mengubah kata sandi. Link mungkin kadaluarsa.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Simpan Kata Sandi';
                }
            });
        });
    </script>
</body>

</html>
