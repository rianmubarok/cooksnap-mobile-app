<!-- VIEW: LOGIN -->
<div
  id="login-view"
  class="flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-cookgreen-50 to-gray-100 hidden relative overflow-hidden"
>
  <!-- Floating shapes -->
  <div class="absolute inset-0 w-full h-full overflow-hidden pointer-events-none z-0">
    <div class="absolute w-96 h-96 bg-cooklime/30 rounded-full blur-[80px] -top-24 -left-24 animate-float"></div>
    <div
      class="absolute w-72 h-72 bg-cookorange/15 rounded-full blur-[80px] -bottom-12 -right-12 animate-float"
      style="animation-delay: -5s"
    ></div>
  </div>

  <div class="glass-panel w-full max-w-md p-8 rounded-3xl shadow-2xl animate-slide-up border border-white relative z-10">
    <div class="flex justify-center mb-6">
      <div class="bg-cookgreen-900 p-3 rounded-2xl shadow-lg">
        <i data-feather="lock" class="w-8 h-8 text-white"></i>
      </div>
    </div>
    <h1 class="text-3xl font-medium text-center text-gray-900 tracking-tighter mb-2">Admin Portal</h1>
    <p class="text-center text-gray-500 mb-8">Masuk untuk mengelola data CookSnap</p>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email Admin</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="mail" class="w-5 h-5 text-gray-400"></i>
          </div>
          <input
            type="email"
            id="login-email"
            required
            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
            placeholder="admin@cooksnap.com"
          />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i data-feather="key" class="w-5 h-5 text-gray-400"></i>
          </div>
          <input
            type="password"
            id="login-password"
            required
            class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-cookgreen-500 focus:border-cookgreen-500 bg-white/60 transition-all outline-none"
            placeholder="••••••••"
          />
        </div>
      </div>
      <button
        type="submit"
        id="login-btn"
        class="w-full flex justify-center items-center gap-2 bg-cookgreen-900 text-white py-3 px-4 rounded-xl font-semibold hover:bg-cookgreen-600 hover:shadow-lg hover:-translate-y-0.5 transition-all"
      >
        Masuk ke Dashboard
        <i data-feather="arrow-right" class="w-5 h-5"></i>
      </button>
    </form>
  </div>
</div>
